modLoader="javafml"
loaderVersion="[4,)"
license="MIT"

[[mods]]
modId="${mod_id}"
version="${version}"
displayName="${mod_name}"
description="Hardcore daytime zombie survival with torch safety mechanics."
authors="DeadSun"

[[mixins]]
config="deadsun.mixins.json"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[26.2,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="cloth_config"
    type="optional"
    versionRange="[16.0.0,)"
    ordering="AFTER"
    side="CLIENT"

[[extensions.${mod_id}]]
    modId="cloth-config"
    type="optional"
    side="CLIENT"
